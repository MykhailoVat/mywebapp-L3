---
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net

  app:
    image: ghcr.io/mykhailovat/mywebapp-l3:${APP_TAG:-latest}
    depends_on:
      - db
    volumes:
      - ./docker_conf/config.json:/etc/mywebapp/config.json
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://0.0.0.0:3000/health/alive"]
      interval: 5s
      timeout: 2s
      retries: 20
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker_conf/mywebapp.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net:
